<div class="w-[760px] max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-xl px-10 py-8">
  <div class="flex items-center gap-4">
    <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">
      <span class="text-green-800 text-2xl font-black">i</span>
    </div>
    <h2 class="text-3xl font-extrabold text-gray-900">
      {{ 'CONFIRM_EMAIL.TITLE' | translate }}
    </h2>
  </div>

  <div class="mt-6">
    <p class="text-3xl leading-tight text-gray-900">
      {{ 'CONFIRM_EMAIL.SUBTITLE' | translate }}
    </p>

    <p class="text-4xl font-extrabold text-green-800 mt-2 break-words">
      {{ email || ('CONFIRM_EMAIL.EMAIL_FALLBACK' | translate) }}
    </p>
  </div>

  <div class="mt-7 h-px bg-gray-200"></div>

  <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-6">
    <button
      type="button"
      class="h-14 rounded-xl bg-gray-200 text-gray-500 font-semibold"
      (click)="cancelled.emit()"
      [disabled]="loading"
      [ngClass]="loading ? 'opacity-70 cursor-not-allowed' : ''"
    >
      {{ 'COMMON.CANCEL' | translate }}
    </button>

    <button
      type="button"
      class="h-14 rounded-xl bg-green-800 text-white font-semibold hover:bg-green-900"
      (click)="validated.emit()"
      [disabled]="loading"
      [ngClass]="loading ? 'opacity-70 cursor-not-allowed' : ''"
    >
      {{ 'CONFIRM_EMAIL.VALIDATE' | translate }}
    </button>
  </div>
</div>
