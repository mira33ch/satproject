<div class="w-[520px] max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-xl p-10 relative">

  <!-- Close -->
  <button
    type="button"
    class="absolute top-5 right-5 text-gray-400 hover:text-gray-700"
    (click)="requestClose()"
    [attr.aria-label]="'COMMON.CLOSE' | translate"
  >
    ✕
  </button>

  <h2 class="text-center text-2xl font-extrabold text-gray-900 tracking-wide">
    {{ 'AUTH.LOGIN_TITLE_UPPER' | translate }}
  </h2>
  <!-- Message d'erreur API -->
  <div *ngIf="apiError" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-lg api-error">
    <div class="flex">
      <div class="flex-shrink-0">
        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
        </svg>
      </div>
      <div class="ml-3">
        <!-- Utilise le pipe translate avec le code d'erreur -->
        <p class="text-sm text-red-700">
          {{ 'ERRORS.' + apiError.code | translate }}
        </p>
      </div>
    </div>
  </div>

    <div class="h-px bg-gray-200 flex-1"></div>

  <!-- Form -->
  <form (ngSubmit)="submit()" class="space-y-5 max-w-[520px] mx-auto">

    <div class="space-y-2">
      <label class="text-xs font-semibold text-gray-700">
        {{ 'AUTH.EMAIL_LABEL' | translate }}
      </label>

      <sm-input
        [formGroup]="form"
        controlName="email"
        [submitted]="submitted"
        type="email"
        [required]="true"
        [maxLength]="120"
        [placeholderKey]="'AUTH.EMAIL_PLACEHOLDER'"
      ></sm-input>
    </div>

    <div class="space-y-2">
      <label class="text-xs font-semibold text-gray-700">
        {{ 'AUTH.PASSWORD_LABEL' | translate }}
      </label>

      <sm-input
        [formGroup]="form"
        controlName="password"
        [submitted]="submitted"
        type="password"
        [required]="true"
        [maxLength]="64"
        [placeholderKey]="'AUTH.PASSWORD_PLACEHOLDER'"
      ></sm-input>
    </div>

    <div class="flex items-center justify-between pt-1">
      <label class="flex items-center gap-2 text-xs text-gray-600">
        <input type="checkbox" class="rounded border-gray-300" [formControl]="form.controls.rememberMe" />
        {{ 'AUTH.REMEMBER_ME' | translate }}
      </label>

      <button
        type="button"
        class="text-xs text-[#337027] font-semibold hover:underline"
        (click)="openForgotPassword()"
      >
        {{ 'AUTH.FORGOT_PASSWORD' | translate }}
      </button>
    </div>

    <div class="pt-1">
      <sm-button
        type="submit"
        variant="primary"
        size="md"
        [fullWidth]="true"
        [label]="'AUTH.LOGIN'| translate"
        [loading]="loading"
        extraClass="h-12"
      ></sm-button>
    </div>

    <div class="text-xs text-center text-gray-500 pt-1">
      {{ 'AUTH.NO_ACCOUNT' | translate }}
      <button type="button" class="text-[#337027] font-semibold hover:underline" (click)="goToRegister()">
        {{ 'AUTH.SIGNUP' | translate }}
      </button>
    </div>

  </form>
</div>
