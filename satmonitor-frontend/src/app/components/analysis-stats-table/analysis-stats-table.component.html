<div class="bg-white border border-green-700/20 rounded-2xl p-5">
  <div class="flex items-center justify-between">
    <div class="text-lg font-semibold text-gray-900">Statistiques Zone</div>
    <button class="w-12 h-12 rounded-xl bg-green-700 text-white flex items-center justify-center shadow">
      <img src="assets/icons/download.svg" class="w-6 h-6" alt="download" />
    </button>
  </div>

  <div class="mt-4 overflow-hidden rounded-xl bg-gray-50">
    <table class="w-full text-sm">
      <thead class="bg-green-700/20 text-gray-900">
        <tr>
          <th class="text-left px-4 py-3">Zone</th>
          <th class="text-left px-4 py-3">Surf Analysée</th>
          <th class="text-left px-4 py-3">NBR Moy</th>
          <th class="text-left px-4 py-3">NBR Max</th>
          <th class="text-left px-4 py-3">Confiance</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows" class="border-t border-gray-200">
          <td class="px-4 py-3">{{ r.zone }}</td>
          <td class="px-4 py-3">{{ r.surf }}</td>
          <td class="px-4 py-3">{{ r.nbrAvg }}</td>
          <td class="px-4 py-3">{{ r.nbrMax }}</td>
          <td class="px-4 py-3">{{ r.conf }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
