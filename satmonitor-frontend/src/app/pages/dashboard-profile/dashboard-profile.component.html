<div class="w-full h-full">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-4">
    <button
      class="w-10 h-10 rounded-lg border border-green-700/40 hover:bg-gray-50"
      type="button"
      (click)="back()">
      ←
    </button>
    <div class="text-xl font-semibold text-gray-900">
      Profil
    </div>
  </div>

  <!-- Card -->
  <div class="bg-white border border-gray-200 rounded-2xl p-8 h-[calc(100%-64px)] overflow-auto">

    <!-- Top user block -->
    <div class="flex flex-col items-center">
      <div class="relative">
        <img
          [src]="user?.avatarUrl || 'assets/user.png'"
          class="w-24 h-24 rounded-2xl object-cover border border-gray-200"
          alt="avatar" />

        <!-- avatar edit btn -->
        <label
          class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-12 h-12 rounded-xl bg-green-800 text-white flex items-center justify-center shadow cursor-pointer">
          <img src="assets/icons/users/pen.svg" class="w-5 h-5" alt="edit" />
          <input
            #avatarInput
            type="file"
            accept="image/*"
            class="hidden"
            (change)="onPickAvatar(avatarInput)" />
        </label>
      </div>

      <div class="mt-6 text-2xl font-semibold text-gray-900">
        {{ user?.firstName }} {{ user?.lastName }}
      </div>
      <div class="text-sm text-gray-500">
        {{ user?.roleLabel || 'Administrateur' }}
      </div>
    </div>

    <!-- Tabs -->
    <div class="mt-8 max-w-2xl mx-auto">
      <div class="bg-green-100/60 rounded-xl p-1 flex">
        <button
          type="button"
          class="flex-1 h-10 rounded-lg text-sm font-semibold"
          [ngClass]="tab==='info' ? 'bg-green-800 text-white' : 'text-green-900'"
          (click)="setTab('info')">
          Information personnelle
        </button>

        <button
          type="button"
          class="flex-1 h-10 rounded-lg text-sm font-semibold"
          [ngClass]="tab==='password' ? 'bg-green-800 text-white' : 'text-green-900'"
          (click)="setTab('password')">
          Changer mot de passe
        </button>
      </div>

      <!-- INFO TAB -->
      <div *ngIf="tab==='info'" class="mt-6">
        <form [formGroup]="infoForm" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-900 mb-2">Nom</label>
            <input
              formControlName="lastName"
              class="w-full h-12 px-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-700/20"
              placeholder="Entrer votre nom" />
            <div *ngIf="infoForm.get('lastName')?.touched && infoForm.get('lastName')?.invalid" class="text-sm text-red-600 mt-1">
              Nom requis
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-900 mb-2">Prénom</label>
            <input
              formControlName="firstName"
              class="w-full h-12 px-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-700/20"
              placeholder="Entrer votre prénom" />
            <div *ngIf="infoForm.get('firstName')?.touched && infoForm.get('firstName')?.invalid" class="text-sm text-red-600 mt-1">
              Prénom requis
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-900 mb-2">Email</label>
            <input
              formControlName="email"
              class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50 text-gray-600 outline-none"
              placeholder="Email" />
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-900 mb-2">Rôle</label>
            <input
              formControlName="roleLabel"
              class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50 text-gray-600 outline-none"
              placeholder="Rôle" />
          </div>

          <!-- feedback -->
          <div *ngIf="infoSuccess" class="text-sm text-green-700 font-semibold">{{ infoSuccess }}</div>
          <div *ngIf="infoError" class="text-sm text-red-600 font-semibold">{{ infoError }}</div>

          <button
            type="button"
            class="w-full h-12 rounded-xl bg-green-800 text-white font-semibold hover:bg-green-900 disabled:opacity-60"
            (click)="saveInfo()"
            [disabled]="savingInfo">
            {{ savingInfo ? 'En cours...' : 'Mettre à jour' }}
          </button>
        </form>
      </div>

      <!-- PASSWORD TAB -->
      <div *ngIf="tab==='password'" class="mt-6">
        <form [formGroup]="passwordForm" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-900 mb-2">Mot de passe actuel</label>
            <div class="relative">
              <input
                [type]="showCurrent ? 'text' : 'password'"
                formControlName="currentPassword"
                class="w-full h-12 px-4 pr-12 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-700/20"
                placeholder="Entrer votre mot de passe actuel" />
              <button
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-lg hover:bg-gray-50 flex items-center justify-center"
                (click)="showCurrent = !showCurrent">
                <img [src]="showCurrent ? 'assets/icons/eye-off.svg' : 'assets/icons/eye.svg'" class="w-5 h-5" alt="toggle" />
              </button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-900 mb-2">Nouveau mot de passe</label>
            <div class="relative">
              <input
                [type]="showNew ? 'text' : 'password'"
                formControlName="newPassword"
                class="w-full h-12 px-4 pr-12 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-700/20"
                placeholder="Entrer votre nouveau mot de passe" />
              <button
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-lg hover:bg-gray-50 flex items-center justify-center"
                (click)="showNew = !showNew">
                <img [src]="showNew ? 'assets/icons/eye-off.svg' : 'assets/icons/eye.svg'" class="w-5 h-5" alt="toggle" />
              </button>
            </div>
            <div *ngIf="passwordForm.get('newPassword')?.touched && passwordForm.get('newPassword')?.invalid" class="text-sm text-red-600 mt-1">
              8 caractères minimum
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-900 mb-2">Confirmer le mot de passe</label>
            <div class="relative">
              <input
                [type]="showConfirm ? 'text' : 'password'"
                formControlName="confirmPassword"
                class="w-full h-12 px-4 pr-12 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-700/20"
                placeholder="Entrer à nouveau le mot de passe" />
              <button
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-lg hover:bg-gray-50 flex items-center justify-center"
                (click)="showConfirm = !showConfirm">
                <img [src]="showConfirm ? 'assets/icons/eye-off.svg' : 'assets/icons/eye.svg'" class="w-5 h-5" alt="toggle" />
              </button>
            </div>
            <div *ngIf="passwordMismatch" class="text-sm text-red-600 mt-1">
              Les mots de passe ne correspondent pas
            </div>
          </div>

          <!-- feedback -->
          <div *ngIf="pwdSuccess" class="text-sm text-green-700 font-semibold">{{ pwdSuccess }}</div>
          <div *ngIf="pwdError" class="text-sm text-red-600 font-semibold">{{ pwdError }}</div>

          <button
            type="button"
            class="w-full h-12 rounded-xl bg-green-800 text-white font-semibold hover:bg-green-900 disabled:opacity-60"
            (click)="savePassword()"
            [disabled]="savingPwd">
            {{ savingPwd ? 'En cours...' : 'Mettre à jour' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
