<div class="relative">
  <div class="bg-green-50 rounded-2xl border border-gray-200 p-4 cursor-pointer select-none"
       (click)="toggleMenu()">
    <div class="h-20 rounded-xl border border-green-800/40 bg-white flex items-center justify-center">
      <img src="assets/icons/file.svg" class="w-10 h-10" alt="">
    </div>

    <div class="mt-2 text-xs text-gray-800 truncate">{{ report.name }}</div>
  </div>

  <!-- Menu -->
  <app-report-actions-menu
    *ngIf="menuOpen"
    [report]="report"
    (close)="menuOpen=false"
    (download)="onDownload($event)"
    (delete)="onDelete()">
  </app-report-actions-menu>
</div>
