<div class="w-full h-full">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-4">
        <button class="w-10 h-10 rounded-lg border border-green-700/40 hover:bg-gray-50" type="button" (click)="back()">
            ←
        </button>
        <div class="text-xl font-semibold text-gray-900">
            {{ 'USERS.TITLE' | translate }}
        </div>
    </div>

    <!-- KPI strip -->
    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6">
        <div class="grid grid-cols-1 md:grid-cols-6 gap-6">
            <div *ngFor="let k of kpis; let i = index" class="flex items-center gap-3">
                <div class="px-2 space-y-2">
                    <div class="flex items-center ">
                        <div
                            class="w-10 h-10 rounded-xl bg-white border border-gray-200 flex items-center justify-center mr-8">
                            <img [src]="k.icon" class="w-5 h-5" alt="">
                        </div>
                        <div class="text-sm text-gray-500">{{ k.label | translate }}</div>

                    </div>

                    <div class="text-xl font-bold text-gray-900 mt-1">{{ k.value }}</div>
                </div>



                <div class="hidden md:block ml-auto h-10 w-px bg-gray-200" *ngIf="i < (kpis.length - 1)"></div>
            </div>
        </div>
    </div>

    <!-- Search + Add -->
    <div class="mt-4 flex items-center gap-3">
        <div class="flex-1">
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                    <img src="assets/icons/search.svg" class="w-5 h-5" alt="">
                </span>

                <!-- Reactive (pas ngModel) -->
                <input class="w-full h-12 pl-11 pr-4 rounded-xl border border-gray-200 outline-none"
                    [placeholder]="'USERS.SEARCH_PLACEHOLDER' | translate" [formControl]="searchCtrl" />
            </div>
        </div>

        <!-- Add button -->
        <button class="w-12 h-12 rounded-xl bg-green-800 text-white flex items-center justify-center hover:bg-green-900"
            type="button" (click)="openAdd()" [title]="'USERS.ADD' | translate">
            <span class="text-2xl leading-none">+</span>
        </button>
    </div>

    <!-- Table card -->
    <div class="mt-4 bg-white border border-gray-200 rounded-2xl overflow-hidden">
        <!-- header row -->
        <div class="grid grid-cols-12 gap-4 px-6 py-4 bg-[#156004]/30 text-sm text-gray-700 font-semibold">
            <div class="col-span-1"></div>
            <div class="col-span-4">{{ 'USERS.COL_LASTNAME' | translate }}</div>
            <div class="col-span-4">{{ 'USERS.COL_FIRSTNAME' | translate }}</div>
            <div class="col-span-2">{{ 'USERS.COL_ROLE' | translate }}</div>
            <div class="col-span-1 text-right"></div>
        </div>

        <!-- rows -->
        <div *ngFor="let u of pagedUsers"
            class="grid grid-cols-12 gap-4 px-6 py-4 border-t border-gray-100 items-center">
            <!-- avatar -->
            <div class="col-span-1">
                <div class="w-9 h-9 rounded-full overflow-hidden bg-gray-100 border border-gray-200">
                    <img [src]="u.avatarUrl || 'assets/user.png'" class="w-full h-full object-cover" alt="">
                </div>
            </div>

            <div class="col-span-4 text-gray-900">{{ u.lastName }}</div>
            <div class="col-span-4 text-gray-900">{{ u.firstName }}</div>
            <div class="col-span-2 text-gray-900">{{ u.roleLabel | translate }}</div>

            <!-- actions -->
            <div class="col-span-1 flex items-center justify-end gap-3">
                <!-- status toggle -->
                <button type="button" class="w-14 h-8 rounded-full relative border border-gray-200"
                    [ngClass]="u.enabled ? 'bg-[#65FFB8]' : 'bg-[#FF7C7E]'" (click)="toggleEnabled(u)"
                    [title]="'USERS.TOGGLE' | translate">
                    <span class="absolute top-1 w-6 h-6 rounded-full shadow bg-white transition"
                        [ngClass]="u.enabled ? 'left-7' : 'left-1'"></span>
                </button>

                <button type="button" class="text-gray-500 hover:text-gray-800" (click)="editUser(u)" title="Edit">
                    <img src="assets/icons/users/pen.svg" class="w-5 h-5" alt="">
                </button>
                <button type="button" class="text-red-600 hover:text-red-700" (click)="deleteUser(u)" title="Delete">
                    <img src="assets/icons/users/trash.svg" class="w-5 h-5" alt="">
                </button>
            </div>
        </div>

        <!-- Pagination -->
        <div class="px-6 py-5 border-t border-gray-100 flex items-center justify-center gap-2 text-sm text-gray-700">
            <button class="w-10 h-10 rounded-lg hover:bg-gray-50 border border-gray-200" type="button"
                (click)="goPage(page-1)">
                ‹
            </button>

            <button *ngFor="let p of pages" class="w-10 h-10 rounded-lg border border-gray-200 hover:bg-gray-50"
                type="button" [ngClass]="p===page ? 'bg-gray-100 font-semibold' : ''" (click)="goPage(p)">
                {{ p }}
            </button>

            <button class="w-10 h-10 rounded-lg hover:bg-gray-50 border border-gray-200" type="button"
                (click)="goPage(page+1)">
                ›
            </button>
        </div>
    </div>

    <!-- Add modal -->
    <sm-modal *ngIf="showAdd" size="lg" [hideHeader]="true" [backdropClass]="'bg-gray-900/60'"
        (close)="showAdd = false">
        <app-add-user-popup (close)="showAdd = false"
            (created)="onUserCreated($event); showAdd = false"></app-add-user-popup>
    </sm-modal>
</div>
