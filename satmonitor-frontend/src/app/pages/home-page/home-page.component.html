<div class="h-full w-full grid grid-cols-1 xl:grid-cols-[520px_1fr] gap-6 overflow-hidden">
    <!-- Left panel -->
    <div class="bg-white border border-green-700/70 rounded-2xl p-6 overflow-auto">
        <!-- Tabs + header -->
        <div class="flex items-center justify-between">
            <div class="w-full inline-flex bg-gray-100 rounded-xl p-1 ">
                <button type="button" class=" w-1/2 px-4 py-2 rounded-lg text-sm font-semibold"
                    [ngClass]="tab==='general' ? 'bg-green-700 text-white' : 'text-gray-700'"
                    (click)="setTab('general')">
                    Généraux
                </button>
                <button type="button" class=" w-1/2 px-4 py-2 rounded-lg text-sm font-semibold"
                    [ngClass]="tab==='custom' ? 'bg-green-700 text-white' : 'text-gray-700'" (click)="setTab('custom')">
                    Personnalisés
                </button>
            </div>

    
        </div>

        <div class="mt-6 flex items-center justify-between">
            <div class="text-gray-900 font-medium">Liste des indicateurs</div>
            <div class="flex items-center gap-2">

                <button class="h-10 px-4 rounded-xl border border-green-700/40 hover:bg-gray-50" (click)="goAll()">
                    Voir tout
                </button>
                <button
                    class="w-10 h-10 rounded-xl bg-green-700 text-white hover:bg-green-800 flex items-center justify-center"
                    title="Ajouter">
                    +
                </button>
            </div>

        </div>

        <div class="mt-5 space-y-4">
            <app-indicator-card *ngFor="let it of items" [item]="it"></app-indicator-card>
        </div>

        <!-- bottom summary card -->
        <!-- Key indicators card -->
        <div class="mt-6 relative bg-gray-50 border border-gray-200 rounded-2xl p-5 pt-10">
            <!-- Icon badge -->
            <!-- <div
                class="absolute top-6 left-6 w-14 h-14 rounded-2xl bg-white border border-gray-200 shadow-sm flex items-center justify-center">
                <img src="assets/icons/chart.svg" alt="key metrics" class="w-7 h-7" />
            </div> -->

            <div class="grid grid-cols-2 gap-6 text-sm text-gray-700">
                <div>
                    <div class="font-semibold text-gray-900 flex justify-between items-center ">
                        <div
                            class=" w-14 h-14 rounded-2xl bg-white border border-gray-200 shadow-sm flex items-center justify-center">
                            <img src="assets/icons/chart.svg" alt="key metrics" class="w-7 h-7" />
                        </div>
                        <div>
                            Indicateurs clés
                        </div>
                    </div>
                    <div class="mt-3">Surface surveillée</div>
                    <div class="font-semibold text-gray-900">550 000 km²</div>
                </div>

                <div class="border-l border-gray-200 pl-6">
                    <div class="font-semibold text-gray-900">Dernière mise à jour</div>
                    <div class="mt-3 font-semibold text-gray-900">10:45</div>
                    <div class="mt-3">Données disponibles</div>
                    <div class="font-semibold text-gray-900">98,7%</div>
                </div>
            </div>
        </div>

    </div>

    <!-- Map panel FULL -->
    <div class="bg-white border border-green-700/70 rounded-2xl overflow-hidden relative">
        <!-- Map overlay button (icone map) -->
        <button
            class="absolute top-4 right-4 z-20 w-12 h-12 rounded-xl bg-white border border-green-700/40 shadow hover:bg-gray-50 flex items-center justify-center"
            (click)="goMap()" title="Carte">
            <img class="w-6 h-6" src="assets/icons/map.svg" alt="map" />
        </button>

        <div class="h-full w-full">
            <app-sat-map></app-sat-map>
        </div>
    </div>
