<div class="w-[520px] max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-xl px-12 py-10 relative">
  <!-- Close -->
  <button
    type="button"
    class="absolute top-5 right-5 text-gray-400 hover:text-gray-700 text-xl"
    (click)="cancel()"
    aria-label="Close"
  >
    ✕
  </button>

  <!-- Title -->
  <h2 class="text-center text-4xl font-extrabold text-gray-800">
    Mot de passe oublié
  </h2>

  <!-- Form -->
  <div class="mt-10">
    <label class="block text-sm font-semibold text-gray-700 mb-2">
      Email
    </label>

    <!-- Si tu as sm-input, utilise-le (même style que vos popups) -->
    <sm-input
      [placeholder]="'exemple@satmonitor.com'"
      [value]="email"
      (valueChange)="onEmailChange($event)"
    ></sm-input>

    <p *ngIf="error" class="mt-2 text-sm text-red-600">{{ error }}</p>

    <button
      type="button"
      class="mt-5 w-full h-12 rounded-lg bg-green-800 text-white font-semibold hover:bg-green-900"
      (click)="confirm()"
    >
      Confirmer
    </button>

    <!-- optionnel: feedback -->
    <p *ngIf="success" class="mt-3 text-sm text-green-700 text-center">
      Un email de réinitialisation a été envoyé si le compte existe.
    </p>
  </div>
</div>
