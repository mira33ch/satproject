<div class="w-full">
  <div class="text-lg font-semibold text-gray-900">{{ 'REPORTS.LIST.TITLE' | translate }}</div>

  <!-- Search -->
  <div class="mt-3">
    <div class="relative">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"> <img src="assets/icons/search.svg" class="w-5 h-5" alt=""></span>
      <input class="w-full h-11 pl-11 pr-4 rounded-xl border border-gray-200 outline-none"
             [value]="search"
             (input)="emitSearch($event)"
             [placeholder]="'REPORTS.LIST.SEARCH' | translate">
    </div>
  </div>

  <!-- Grid of reports -->
  <div class="mt-5 grid grid-cols-2 sm:grid-cols-3 gap-4">
    <app-report-card
      *ngFor="let r of reports"
      [report]="r"
      (action)="action.emit($event)">
    </app-report-card>
  </div>
</div>
