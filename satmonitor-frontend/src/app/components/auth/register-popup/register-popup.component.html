<div class="w-[520px] max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-xl p-10 relative">
    <!-- Close -->
    <button type="button" class="absolute top-5 right-5 text-gray-400 hover:text-gray-700" (click)="cancel()"
        [attr.aria-label]="'COMMON.CLOSE' | translate">
        ✕
    </button>

    <!-- Title -->
    <h2 class="text-center text-2xl font-extrabold text-gray-900 tracking-wide">
        {{ 'AUTH.SIGNUP_TITLE_UPPER' | translate }}
    </h2>

    <!-- Stepper / Toggle -->
    <div class="mt-6 flex items-center justify-center">
        <div class="inline-flex bg-gray-100 rounded-xl p-1">
            <button type="button" class="px-4 py-2 rounded-lg text-sm font-semibold"
                [ngClass]="step === 1 ? 'bg-white shadow text-gray-900' : 'text-gray-600 hover:text-gray-900'"
                (click)="goStep(1)">
                {{ 'REGISTER.STEP1.TITLE' | translate }}
            </button>

            <button type="button" class="px-4 py-2 rounded-lg text-sm font-semibold"
                [ngClass]="step === 2 ? 'bg-white shadow text-gray-900' : 'text-gray-600 hover:text-gray-900'"
                (click)="goStep(2)">
                {{ 'REGISTER.STEP2.TITLE' | translate }}
            </button>
        </div>
    </div>

     <!-- Message d'erreur API -->
    <div *ngIf="apiError" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-lg api-error">
        <div class="flex">
            <div class="flex-shrink-0">
                <!-- Icône d'erreur -->
                <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                </svg>
            </div>
            <div class="ml-3">
                <!-- Utiliser le pipe translate avec le code d'erreur -->
                <p class="text-sm text-red-700">
                    {{ 'ERRORS.' + apiError.code | translate }}
                </p>
            </div>
        </div>
    </div>

    <!-- Content -->
    <form class="mt-8 max-w-[520px] mx-auto" (ngSubmit)="submit()">

        <!-- STEP 1 - Entreprise -->
        <div *ngIf="step === 1" class="space-y-5">
            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP1.COMPANY_NAME_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="companyName" [submitted]="finalSubmitted" [required]="true"
                    [maxLength]="120" [placeholderKey]="'REGISTER.STEP1.COMPANY_NAME_PLACEHOLDER'">
                </sm-input>
            </div>


            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP1.COMPANY_COUNTRY_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="country" [submitted]="finalSubmitted" [required]="true"
                    [maxLength]="100" [placeholderKey]="'REGISTER.STEP1.COMPANY_COUNTRY_PLACEHOLDER'"></sm-input>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP1.COMPANY_ADDRESS_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="address" [submitted]="finalSubmitted" [required]="true"
                    [maxLength]="200" [placeholderKey]="'REGISTER.STEP1.COMPANY_ADDRESS_PLACEHOLDER'"></sm-input>
            </div>



            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP1.COMPANY_PHONE_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="companyPhone" [submitted]="finalSubmitted" type="tel"
                    [intlTelInput]="true" [initialCountry]="'tn'" [required]="true"
                    [placeholderKey]="'REGISTER.STEP1.COMPANY_PHONE_PLACEHOLDER'">
                </sm-input>
            </div>

            <div class="pt-3 flex justify-between gap-3">
                <sm-button type="button" variant="outline" size="lg" [fullWidth]="true"
                    [label]="'COMMON.CANCEL'| translate" (clicked)="cancel()"
                    extraClass="h-12 min-w-[200px]"></sm-button>

                <sm-button type="button" variant="primary" size="lg" [fullWidth]="true"
                    [label]="'COMMON.NEXT'| translate" (clicked)="next()" extraClass="h-12 min-w-[200px]"></sm-button>
            </div>
        </div>

        <!-- STEP 2 - Compte -->
        <div *ngIf="step === 2" class="space-y-5">
            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP2.USERNAME_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="username" [submitted]="finalSubmitted" [required]="true"
                    [maxLength]="80" [placeholderKey]="'REGISTER.STEP2.USERNAME_PLACEHOLDER'"
                    [personalError]="cUsername.hasError('serverError') ? ('ERRORS.REGISTER.USERNAME_EXISTS' | translate) : undefined"></sm-input>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP2.EMAIL_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="email" [submitted]="finalSubmitted" type="email"
                    [required]="true" [maxLength]="120" [placeholderKey]="'REGISTER.STEP2.EMAIL_PLACEHOLDER'"
                    [personalError]="form.errors?.['emailsSame'] ? ('REGISTER.STEP2.EMAILS_SAME_ERROR' | translate) : undefined"></sm-input>
            
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP2.PHONE_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="phone" [submitted]="finalSubmitted" type="tel"
                    [intlTelInput]="true" [initialCountry]="'tn'" [required]="true"
                    [placeholderKey]="'REGISTER.STEP2.PHONE_PLACEHOLDER'">
                </sm-input>
            </div>


            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP2.PASSWORD_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="password" [submitted]="finalSubmitted" [required]="true"
                    [maxLength]="64" [type]="showPassword ? 'text' : 'password'" [rightIcon]="true"
                    [rightIconSrc]="showPassword ? 'icons/eye-off.svg' : 'icons/eye.svg'"
                    (rightIconClick)="togglePassword()"
                    [placeholderKey]="'REGISTER.STEP2.PASSWORD_PLACEHOLDER'"></sm-input>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-700">
                    {{ 'REGISTER.STEP2.CONFIRM_PASSWORD_LABEL' | translate }}
                </label>
                <sm-input [formGroup]="form" controlName="confirmPassword" [submitted]="finalSubmitted"
                    [required]="true" [maxLength]="64" [type]="showConfirmPassword ? 'text' : 'password'"
                    [rightIcon]="true" [rightIconSrc]="showConfirmPassword ? 'icons/eye-off.svg' : 'icons/eye.svg'"
                    (rightIconClick)="toggleConfirmPassword()"
                    [placeholderKey]="'REGISTER.STEP2.CONFIRM_PASSWORD_PLACEHOLDER'"
                    [personalError]="form.errors?.['passwordMismatch'] ? ('REGISTER.STEP2.PASSWORD_MISMATCH' | translate) : undefined"></sm-input>
            </div>

            <div class="pt-3 flex justify-between">
                <sm-button type="button" variant="outline" size="md" [fullWidth]="true"
                    [label]="'COMMON.PREVIOUS' | translate" (clicked)="previous()"
                    extraClass="h-12 min-w-[200px]"></sm-button>

                <sm-button type="submit" variant="primary" size="md" [fullWidth]="true"
                    [label]="'AUTH.SIGNUP' | translate" [loading]="loading" extraClass="h-12 min-w-[200px]"></sm-button>
            </div>
        </div>

    </form>
</div>
