<div class="absolute z-50 -top-2 left-1/2 -translate-x-1/2 translate-y-[-100%]
            w-56 bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
  <button class="w-full px-5 py-3 text-left hover:bg-gray-50" (click)="download.emit('PDF')">PDF</button>
  <div class="h-px bg-gray-200"></div>

  <button class="w-full px-5 py-3 text-left hover:bg-gray-50" (click)="download.emit('EXCEL')">Excel</button>
  <div class="h-px bg-gray-200"></div>

  <button class="w-full px-5 py-3 text-left hover:bg-gray-50" (click)="download.emit('GEOTIFF')">GeoTIFF</button>
  <div class="h-px bg-gray-200"></div>

  <button class="w-full px-5 py-3 text-left hover:bg-gray-50" (click)="download.emit('RAW')">
    {{ 'REPORTS.MENU.RAW' | translate }}
  </button>
  <div class="h-px bg-gray-200"></div>

  <button class="w-full px-5 py-3 text-left text-red-600 hover:bg-red-50" (click)="delete.emit()">
    {{ 'REPORTS.MENU.DELETE' | translate }}
  </button>
</div>
