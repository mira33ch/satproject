<div class="w-[720px] max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-xl px-12 py-10">
  <h2 class="text-center text-4xl font-extrabold text-gray-800">
    Réinitialisation mot de passe
  </h2>

  <div class="mt-10 space-y-6">
    <!-- Nouveau mot de passe -->
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">
        Nouveau mot de passe
      </label>

      <div class="relative">
        <sm-input
          [placeholder]="'Entrer un nouveau mot de passe'"
          [type]="showNew ? 'text' : 'password'"
          [value]="newPassword"
          (valueChange)="onChange('newPassword', $event)"
        ></sm-input>

        <button type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 rounded-lg hover:bg-gray-50 flex items-center justify-center"
                (click)="showNew = !showNew"
                aria-label="toggle password">
          <img src="assets/icons/eye.svg" class="w-5 h-5" alt="">
        </button>
      </div>

      <p *ngIf="errors.newPassword" class="mt-2 text-sm text-red-600">{{ errors.newPassword }}</p>
    </div>

    <!-- Confirmer mot de passe -->
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">
        Confirmer le mot de passe
      </label>

      <div class="relative">
        <sm-input
          [placeholder]="'Entrer à nouveau le mot de passe'"
          [type]="showConfirm ? 'text' : 'password'"
          [value]="confirmPassword"
          (valueChange)="onChange('confirmPassword', $event)"
        ></sm-input>

        <button type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 rounded-lg hover:bg-gray-50 flex items-center justify-center"
                (click)="showConfirm = !showConfirm"
                aria-label="toggle password">
          <img src="assets/icons/eye-off.svg" class="w-5 h-5" alt="">
        </button>
      </div>

      <p *ngIf="errors.confirmPassword" class="mt-2 text-sm text-red-600">{{ errors.confirmPassword }}</p>
    </div>

    <!-- token error -->
    <p *ngIf="errors.token" class="text-sm text-red-600">{{ errors.token }}</p>

    <!-- confirm button -->
    <button
      type="button"
      class="w-full h-12 rounded-lg bg-green-800 text-white font-semibold hover:bg-green-900 mt-2"
      (click)="submit()"
      [disabled]="loading"
      [ngClass]="loading ? 'opacity-70 cursor-not-allowed' : ''"
    >
      Confirmer
    </button>

    <p *ngIf="success" class="text-sm text-green-700 text-center">
      Mot de passe mis à jour.
    </p>
  </div>
</div>
