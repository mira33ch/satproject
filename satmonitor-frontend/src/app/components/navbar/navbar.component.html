<div class="w-full px-4 sm:px-6 py-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <!-- Brand -->
    <div class="flex items-center gap-3">
      <img src="assets/logo.png" class="h-10 w-10" alt="SatMonitor" />
      <div class="leading-tight">
        <div class="font-extrabold tracking-wide text-gray-900 text-base sm:text-lg">
          SATMONITOR
        </div>
        <div class="text-xs text-gray-500">
          {{ 'NAVBAR.TAGLINE' | translate }}
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="grid grid-cols-1 sm:flex sm:items-center gap-3 sm:gap-3">
      <sm-button variant="outline" size="sm" [fullWidth]="true" [label]="'AUTH.SIGNUP' | translate"
        (clicked)="openRegister.emit()"></sm-button>

      <sm-button variant="primary" size="sm" [fullWidth]="true" [label]="'AUTH.LOGIN' | translate"
        (clicked)="openLogin.emit()"></sm-button>
    </div>
